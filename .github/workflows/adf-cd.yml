name: Deploy ADF DEV → STAGE

on:
  push:
    branches:
      - adf_publish
  workflow_dispatch:   # manual only until ready 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Login correcto (SIN azure/login)
      - name: Azure Login (User/Password)
        run: |
          az login \
            --username "${{ secrets.AZURE_USERNAME }}" \
            --password "${{ secrets.AZURE_PASSWORD }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      # 3. Deploy ARM Template
      - name: Deploy ADF to STAGE
        run: |
          az deployment group create \
            --resource-group 1-79a159cd-playground-sandbox \
            --template-file ./adf_publish/ARMTemplateForFactory.json \
            --parameters @./adf_publish/ARMTemplateParametersForFactory.json \
            factoryName=adfpocstage918732